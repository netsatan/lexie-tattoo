name: Sync fork on push

on:
  push:
    branches:
      - main # or whatever you care about

jobs:
  sync_fork:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync fork via GitHub API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.FORK_SYNC_TOKEN }}
          script: |
            await github.request('POST /repos/{owner}/{repo}/merge-upstream', {
              owner: 'netsatan',
              repo: 'lexie-tattoo',
              branch: 'main'
            })
